<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Media Hotkeys &mdash; Quick Settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup-page">
    <div class="row row--space-between">
      <h1>Media Hotkeys</h1>
      <div class="settings-field">
        <input type="checkbox" id="hotkeysEnabled" />
        <label for="hotkeysEnabled">
          <span class="screen-reader">Extension</span>
          Enabled
        </label>
      </div>
      <button id="advanced-settings" type="button">
        <span aria-hidden="true" class="icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="20px"
            viewBox="0 -960 960 960"
            width="20px"
            fill="#000"
          >
            <path
              d="m403-96-22-114q-23-9-44.5-21T296-259l-110 37-77-133 87-76q-2-12-3-24t-1-25q0-13 1-25t3-24l-87-76 77-133 110 37q19-16 40.5-28t44.5-21l22-114h154l22 114q23 9 44.5 21t40.5 28l110-37 77 133-87 76q2 12 3 24t1 25q0 13-1 25t-3 24l87 76-77 133-110-37q-19 16-40.5 28T579-210L557-96H403Zm77-240q60 0 102-42t42-102q0-60-42-102t-102-42q-60 0-102 42t-42 102q0 60 42 102t102 42Z"
            />
          </svg>
        </span>
        <span class="screen-reader">Advanced</span>
        Settings
      </button>
    </div>

    <section class="settings-section" aria-labelledby="bindings-title">
      <h2 id="bindings-title">Key Bindings</h2>
      <table id="actions-table">
        <caption class="screen-reader">
          Media actions and their associated hotkeys.
        </caption>
        <thead>
          <tr>
            <th scope="col">Action</th>
            <th scope="col">Hotkeys</th>
          </tr>
        </thead>
        <tbody id="actions-body">
          <!-- populated by quick-settings-popup.ts -->
        </tbody>
      </table>
    </section>

    <div class="site-controls" id="site-controls-container" style="display: none">
      <p id="site-control-status" class="site-control-status"></p>
      <button id="site-control-button" type="button"></button>
      <button id="site-edit-rule-button" type="button">Edit site rule</button>
    </div>

    <div class="button-group button-group">
      <button id="reset" type="button">Restore Defaults</button>
    </div>

    <div id="announcements"></div>
    <div
      id="announcement-live-region"
      class="screen-reader"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script type="module" src="quick-settings-popup.js"></script>
  </body>
</html>
