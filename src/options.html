<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Media Hotkeys — More Settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="options-page">
    <h1>Media Hotkeys — More Settings</h1>
    <table id="actions-table">
      <caption class="screen-reader">
        Media actions and their associated hotkeys, overlay visibility, and overlay position
        settings.
      </caption>
      <thead>
        <tr>
          <th scope="col">Action</th>
          <th scope="col">Hotkeys</th>
          <th scope="col">Overlay Visible</th>
          <th scope="col">Overlay Position</th>
        </tr>
      </thead>
      <tbody id="actions-body">
        <!-- populated by options.ts -->
      </tbody>
    </table>

    <div class="button-group">
      <button id="save" class="primary" type="button">Save</button>
      <button id="reset" type="button">Restore Defaults</button>
      <span id="status" role="status" aria-live="polite" aria-atomic="true"></span>
    </div>
    <div id="announcements" class="screen-reader" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="options.js"></script>
  </body>
</html>
